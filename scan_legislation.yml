name: סריקת עדכוני חקיקה שבועית

on:
  schedule:
    - cron: '0 5 * * 0'
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'סוג סריקה'
        required: true
        default: 'weekly'
        type: choice
        options:
          - weekly
          - full_3_years

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install anthropic
      - name: Run scan
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          FORMSPREE_ID:   ${{ secrets.FORMSPREE_ID }}
          ADMIN_URL:      ${{ secrets.ADMIN_URL }}
        run: |
          if [ "${{ github.event.inputs.scan_type }}" = "full_3_years" ]; then
            python scan_legislation.py --full
          else
            python scan_legislation.py
          fi
      - name: Commit results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add pending_legislation.json || true
          git diff --staged --quiet || git commit -m "⚖️ עדכון חקיקה $(date +'%d/%m/%Y')"
          git push || true
